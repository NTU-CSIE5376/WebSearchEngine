services:
  metric_postgres:
    image: postgres:16
    container_name: metric_postgres
    restart: on-failure
    environment:
      - POSTGRES_USER=metric
      - POSTGRES_PASSWORD=metric
      - POSTGRES_DB=metricdb
    volumes:
      - /data/metric:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U metric -d metricdb'"]
      interval: 600s
      timeout: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
